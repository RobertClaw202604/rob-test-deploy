```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rob is here!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif}
h1{color:#FF5100;font-size:3rem;text-align:center}
.ball{width:50px;height:50px;background:#FF5100;border-radius:50%;position:absolute;bottom:0;animation:bounce 1s infinite alternate ease-in-out}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-300px)}}
.wrapper{position:relative;display:flex;flex-direction:column;align-items:center;gap:60px}
.floor{width:200px;height:4px;background:#FF5100;border-radius:2px;margin-top:20px}
</style>
</head>
<body>
<div class="wrapper">
<h1>Rob is here!</h1>
<div style="position:relative;width:200px;height:350px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">
<div class="ball"></div>
<div class="floor"></div>
</div>
</div>
</body>
</html>
